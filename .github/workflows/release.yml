name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libgles2-mesa-dev \
            p7zip-full

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o GbitsGen-linux-amd64 .

      - name: 7z compress
        run: 7z a -mx=9 GbitsGen-linux-amd64.7z GbitsGen-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: GbitsGen-linux-amd64
          path: GbitsGen-linux-amd64.7z

  build-macos-amd64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o GbitsGen-darwin-amd64 .

      - name: Install 7z
        run: brew install p7zip

      - name: 7z compress
        run: 7z a -mx=9 GbitsGen-darwin-amd64.7z GbitsGen-darwin-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: GbitsGen-darwin-amd64
          path: GbitsGen-darwin-amd64.7z

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o GbitsGen-darwin-arm64 .

      - name: Install 7z
        run: brew install p7zip

      - name: 7z compress
        run: 7z a -mx=9 GbitsGen-darwin-arm64.7z GbitsGen-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: GbitsGen-darwin-arm64
          path: GbitsGen-darwin-arm64.7z

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            p7zip

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          CGO_ENABLED: "1"
          CC: gcc
          MSYS2_PATH_TYPE: inherit
        run: go build -ldflags="-s -w -H windowsgui" -o GbitsGen-windows-amd64.exe .

      - name: 7z compress
        env:
          MSYS2_PATH_TYPE: inherit
        run: 7z a -mx=9 GbitsGen-windows-amd64.7z GbitsGen-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: GbitsGen-windows-amd64
          path: GbitsGen-windows-amd64.7z

  release-latest:
    needs: [test, build-linux, build-macos-amd64, build-macos-arm64, build-windows]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: GbitsGen-*
          merge-multiple: false
          path: artifacts

      - name: Delete old latest release
        run: gh release delete latest --cleanup-tag -y || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        run: |
          cd artifacts
          ls -R
          sha256sum GbitsGen-linux-amd64/GbitsGen-linux-amd64.7z          >  checksums-latest.txt
          sha256sum GbitsGen-darwin-amd64/GbitsGen-darwin-amd64.7z        >> checksums-latest.txt
          sha256sum GbitsGen-darwin-arm64/GbitsGen-darwin-arm64.7z        >> checksums-latest.txt
          sha256sum GbitsGen-windows-amd64/GbitsGen-windows-amd64.7z      >> checksums-latest.txt
          cat checksums-latest.txt

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automated build from `master` branch.\n\nCommit: ${{ github.sha }}\nDate: ${{ github.event.head_commit.timestamp }}"
          files: |
            artifacts/GbitsGen-linux-amd64/GbitsGen-linux-amd64.7z
            artifacts/GbitsGen-darwin-amd64/GbitsGen-darwin-amd64.7z
            artifacts/GbitsGen-darwin-arm64/GbitsGen-darwin-arm64.7z
            artifacts/GbitsGen-windows-amd64/GbitsGen-windows-amd64.7z
            artifacts/checksums-latest.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [test, build-linux, build-macos-amd64, build-macos-arm64, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: GbitsGen-*
          merge-multiple: false
          path: artifacts

      - name: Generate checksums
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cd artifacts
          ls -R
          sha256sum GbitsGen-linux-amd64/GbitsGen-linux-amd64.7z          >  checksums-${VERSION}.txt
          sha256sum GbitsGen-darwin-amd64/GbitsGen-darwin-amd64.7z        >> checksums-${VERSION}.txt
          sha256sum GbitsGen-darwin-arm64/GbitsGen-darwin-arm64.7z        >> checksums-${VERSION}.txt
          sha256sum GbitsGen-windows-amd64/GbitsGen-windows-amd64.7z      >> checksums-${VERSION}.txt
          cat checksums-${VERSION}.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GbitsGen-linux-amd64/GbitsGen-linux-amd64.7z
            artifacts/GbitsGen-darwin-amd64/GbitsGen-darwin-amd64.7z
            artifacts/GbitsGen-darwin-arm64/GbitsGen-darwin-arm64.7z
            artifacts/GbitsGen-windows-amd64/GbitsGen-windows-amd64.7z
            artifacts/checksums-*.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
